<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Nexus Transfer — End-to-end encrypted peer-to-peer file transfer. No uploads. No servers. No compromise." />
    <meta name="theme-color" content="#050508" />
    <meta name="color-scheme" content="dark" />

    <!-- Open Graph -->
    <meta property="og:title"       content="Nexus Transfer" />
    <meta property="og:description" content="Browser-to-browser encrypted file transfer. Zero servers." />
    <meta property="og:type"        content="website" />

    <!-- Apple -->
    <meta name="apple-mobile-web-app-capable"         content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"           content="Nexus Transfer" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Apply theme before paint to prevent flash-of-wrong-theme -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('nexus-theme') || 'dark';
          var resolved = pref === 'system'
            ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
            : pref;
          document.documentElement.setAttribute('data-theme', resolved);
          document.documentElement.classList.add(resolved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <!-- Inter variable font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..700;1,14..32,300..400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <title>Nexus Transfer — Encrypted P2P File Transfer</title>
  </head>
  <body class="bg-void text-text antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
